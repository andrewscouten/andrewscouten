paragraphs:
  - >-
    I'm a machine learning engineer and researcher with a focus on computer vision.
    My work has taken me from Texas highways (TxDOT-funded crack detection using CNNs
    and transformers) to low Earth orbit — segmenting corrosion in metal samples
    collected aboard the ISS during SpaceX-21 — with publications from both.
  - >-
    Outside the lab, I'm usually spending time with family, rolling dice in a D&D
    campaign, or tinkering with my home lab. I play a lot of video games and I'm
    always picking up something new — whether that's a language, a framework, or
    just whatever rabbit hole caught my attention that week.
